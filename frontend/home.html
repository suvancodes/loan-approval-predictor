<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Loan Eligibility - Input</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root{
      --bg-dark-1: #051028;
      --bg-dark-2: #071033;
      --card-bg: rgba(255,255,255,0.06);
      --input-bg: #ffffff;
      --input-text: #052034;
      --muted-white: rgba(255,255,255,0.9);
    }
    html,body{height:100%}
    body{
      margin:0;
      background: linear-gradient(180deg,var(--bg-dark-1),var(--bg-dark-2));
      color:var(--muted-white);
      font-family: system-ui, -apple-system, Roboto, Arial, sans-serif;
      padding-top:72px;
    }
    .topbar{
      position:fixed; top:0; left:0; right:0; z-index:1030;
      background: rgba(2,6,23,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .navbar-brand{ color:#fff !important; font-weight:700; }
    .card{
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius:12px;
      color:var(--muted-white);
    }
    label, .form-label { color: #ffffff !important; font-weight:600; }
    .form-control, .form-select {
      background: var(--input-bg) !important;
      color: var(--input-text) !important;
      border: 1px solid rgba(0,0,0,0.08);
      height:44px;
    }
    .form-control::placeholder { color: rgba(5,32,52,0.45) !important; }
    .form-select option { color: var(--input-text); background: var(--input-bg); }
    .form-control:focus, .form-select:focus {
      outline: none;
      border-color: rgba(79,70,229,0.7);
      box-shadow: 0 6px 20px rgba(79,70,229,0.06);
    }
    .btn-primary {
      background: linear-gradient(90deg,#06b6d4,#4f46e5);
      border: none;
      color: #fff;
    }
    .result-badge { font-size:1.2rem; padding:.6rem 1.2rem; border-radius:10px; display:inline-block; }
    .approved { background: linear-gradient(90deg,#16a34a,#4ade80); color:#04220b; }
    .rejected { background: linear-gradient(90deg,#dc2626,#f97316); color:#3a0b00; }
  </style>
</head>

<body>
  <nav class="navbar topbar">
    <div class="container">
      <a class="navbar-brand" href="/"><i class="bi bi-bank2 me-2"></i> Bank Loan Approval</a>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card p-4 mb-3">
          <h4 class="mb-3">Enter Applicant Details</h4>

          <form id="predictForm" class="row g-3">
            <div class="col-12">
              <label class="form-label">Bank Name</label>
              <select id="Bank_Name" class="form-select" required>
                <option value="" selected disabled>Select bank</option>
                <option value="SBI bank">SBI Bank</option>
                <option value="AXIX bank">AXIX Bank</option>
                <option value="HDFC bank">HDFC Bank</option>
                <option value="Others">Others</option>
              </select>
            </div>

            <div class="col-md-3">
              <label class="form-label">Gender</label>
              <select id="Gender" class="form-select" required>
                <option value="1">Male</option><option value="0">Female</option>
              </select>
            </div>

            <div class="col-md-3">
              <label class="form-label">Married</label>
              <select id="Married" class="form-select" required>
                <option value="1">Yes</option><option value="0">No</option>
              </select>
            </div>

            <div class="col-md-3">
              <label class="form-label">Education</label>
              <select id="Education" class="form-select" required>
                <option value="1">Graduate</option><option value="0">Not Graduate</option>
              </select>
            </div>

            <div class="col-md-3">
              <label class="form-label">Self Employed</label>
              <select id="Self_Employed" class="form-select" required>
                <option value="0">No</option><option value="1">Yes</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Applicant Income</label>
              <input id="ApplicantIncome" type="number" class="form-control" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Coapplicant Income</label>
              <input id="CoapplicantIncome" type="number" class="form-control" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Loan Amount</label>
              <input id="LoanAmount" type="number" class="form-control" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Loan Term (months)</label>
              <input id="Loan_Amount_Term" type="number" class="form-control" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Credit History</label>
              <select id="Credit_History" class="form-select" required>
                <option value="1">Good</option><option value="0">Bad</option>
              </select>
            </div>

            <div class="col-12 text-end">
              <button id="submitBtn" type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-lightning-charge me-2"></i> Predict
              </button>
            </div>
          </form>
        </div>

        <div id="resultCard" class="card p-4" style="display:none;">
          <div class="text-center">
            <h5 class="mb-3">Prediction Result</h5>
            <div id="resultLabel" class="result-badge approved">Approved</div>

            <div class="mt-4">
              <a href="#" id="tryAgain" class="btn btn-outline-secondary">Try again</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script>
    const BACKEND_URL = "https://bank-lone-approval-1.onrender.com/predict";

    document.getElementById('predictForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.innerText = 'Predicting...';

      const payload = {
        Bank_Name: document.getElementById('Bank_Name').value,
        Gender: document.getElementById('Gender').value,
        Married: document.getElementById('Married').value,
        Education: document.getElementById('Education').value,
        Self_Employed: document.getElementById('Self_Employed').value,
        ApplicantIncome: parseFloat(document.getElementById('ApplicantIncome').value) || 0,
        CoapplicantIncome: parseFloat(document.getElementById('CoapplicantIncome').value) || 0,
        LoanAmount: parseFloat(document.getElementById('LoanAmount').value) || 0,
        Loan_Amount_Term: parseFloat(document.getElementById('Loan_Amount_Term').value) || 0,
        Credit_History: document.getElementById('Credit_History').value
      };

      try {
        const res = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: {'Content-Type':'application/json', 'Accept':'application/json'},
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('Server error: ' + res.status);
        const data = await res.json();

        const label = data?.result?.label ?? 'Unknown';

        const resultLabel = document.getElementById('resultLabel');
        resultLabel.textContent = label;
        resultLabel.className = 'result-badge ' + (String(label).toLowerCase().includes('approve') ? 'approved' : 'rejected');

        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
      } catch (err){
        alert('Prediction failed: ' + err.message);
        console.error(err);
      } finally {
        btn.disabled = false; btn.innerHTML = '<i class="bi bi-lightning-charge me-2"></i> Predict';
      }
    });

    document.getElementById('tryAgain').addEventListener('click', (e)=>{
      e.preventDefault();
      document.getElementById('predictForm').reset();
      document.getElementById('resultCard').style.display = 'none';
      window.scrollTo({top:0, behavior:'smooth'});
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
