<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bank Loan Approval</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Animate -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
      color: white;
      overflow: hidden;
    }

    /* 🔥 Loader */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
    }

    /* Glass Card */
    .glass {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      text-align: center;
    }

    /* Button */
    .btn-custom {
      background: linear-gradient(45deg, #6366f1, #06b6d4);
      border: none;
      color: white;
      padding: 12px 25px;
      border-radius: 30px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-custom:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(99,102,241,0.5);
    }

    .title {
      font-size: 2.8rem;
      font-weight: bold;
    }

    .subtitle {
      opacity: 0.8;
    }

    .icon {
      font-size: 40px;
      color: #38bdf8;
    }

  </style>
</head>

<body>

<!-- 🔥 LOADER -->
<div id="loader">
  <h2>🚀 Waking up server...</h2>
  <p>First load may take a few seconds</p>
</div>

<!-- 🔥 MAIN CONTENT -->
<div id="main-content" style="display:none;" class="d-flex justify-content-center align-items-center vh-100">

  <div class="glass animate__animated animate__fadeInUp">

    <div class="mb-3 icon">
      <i class="bi bi-bank2"></i>
    </div>

    <h1 class="title">Loan Approval System</h1>
    <p class="subtitle mt-2">Smart AI-based loan prediction in seconds</p>

    <div class="mt-4">
      <a href="/home" class="btn btn-custom">
        🚀 Try Demo
      </a>
    </div>

  </div>

</div>

<!-- 🔥 SCRIPT -->
<script>
async function wakeUpServer() {
  try {
    const res = await fetch("/health");

    if (res.ok) {
      document.getElementById("loader").style.display = "none";
      document.getElementById("main-content").style.display = "flex";
    } else {
      setTimeout(wakeUpServer, 2000);
    }
  } catch (err) {
    setTimeout(wakeUpServer, 2000);
  }
}

wakeUpServer();
</script>

</body>
</html>
