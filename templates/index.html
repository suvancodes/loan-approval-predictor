<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bank Loan Approval - Info</title>

  <!-- Bootstrap & icons & animate.css -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

  <style>
    body {
      margin:0;
      background:#0f172a;
      color:white;
      font-family:system-ui;
    }

    /* 🔥 Loader */
    #loader {
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:9999;
    }
  </style>
</head>

<body>

<!-- 🔥 LOADER -->
<div id="loader">
  <h2>🚀 Waking up server...</h2>
  <p>Please wait (first load may take 30-60s)</p>
</div>

<!-- 🔥 MAIN CONTENT -->
<div id="main-content" style="display:none;">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">🏦 Bank Loan Approval</span>
  </div>
</nav>

<div class="container mt-5 text-center">
  <h1>Welcome to Loan Approval System</h1>
  <p class="mt-3">Click below to test prediction</p>

  <a href="/home" class="btn btn-primary mt-3">🚀 Try Demo</a>
</div>

</div>

<!-- 🔥 SCRIPT -->
<script>
async function wakeUpServer() {
  try {
    const res = await fetch("https://loan-approval-predictor-xe8v.onrender.com/health");

    if (res.ok) {
      document.getElementById("loader").style.display = "none";
      document.getElementById("main-content").style.display = "block";
    } else {
      setTimeout(wakeUpServer, 3000);
    }
  } catch (err) {
    console.log("Server sleeping...");
    setTimeout(wakeUpServer, 3000);
  }
}

wakeUpServer();
</script>

</body>
</html>
